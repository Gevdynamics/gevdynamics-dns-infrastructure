# DNS Infrastructure CI/CD Pipeline - Shared Account
# Manages Route53 zones, WorkMail, email authentication (SPF/DKIM/DMARC)

name: Deploy

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ROLE_ARN: "arn:aws:iam::501421114105:role/github-actions-role"
  ACCOUNT_ID: "501421114105"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-${{ github.run_id }}

      - name: Terraform Init
        if: hashFiles('terraform/*.tf') != ''
        working-directory: terraform
        run: |
          ORG_NAME=$(echo "${GITHUB_REPOSITORY%/*}" | tr '[:upper:]' '[:lower:]')
          terraform init \
            -backend-config="bucket=${ORG_NAME}-terraform-state-${{ env.ACCOUNT_ID }}" \
            -backend-config="key=${{ github.event.repository.name }}/shared.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${ORG_NAME}-terraform-locks-${{ env.ACCOUNT_ID }}"

      - name: Terraform Plan
        if: hashFiles('terraform/*.tf') != ''
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('terraform/*.tf') != ''
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
